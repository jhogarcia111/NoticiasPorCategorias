<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A66C2"/>
      <stop offset="100%" stop-color="#0055A4"/>
    </linearGradient>
    <linearGradient id="c1r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0055A4"/>
      <stop offset="100%" stop-color="#003E7A"/>
    </linearGradient>
    <linearGradient id="c2l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0055A4"/>
      <stop offset="100%" stop-color="#003E7A"/>
    </linearGradient>
    <linearGradient id="c2r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003E7A"/>
      <stop offset="100%" stop-color="#002A5C"/>
    </linearGradient>
    <linearGradient id="c3l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003E7A"/>
      <stop offset="100%" stop-color="#002A5C"/>
    </linearGradient>
    <linearGradient id="c3r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002A5C"/>
      <stop offset="100%" stop-color="#001A3A"/>
    </linearGradient>
  </defs>

  <!-- Chevron 1 - Recolección de noticias (fuentes múltiples) -->
  <path d="M 50 50 L 200 110 L 350 50 L 350 80 L 200 140 L 50 80 Z" fill="url(#c1l)"/>
  <path d="M 200 110 L 350 50 L 350 80 L 200 140 Z" fill="url(#c1r)"/>

  <!-- Chevron 2 - Procesamiento con IA (filtrado y resumen) -->
  <path d="M 95 120 L 200 175 L 200 203 L 95 148 Z" fill="url(#c2l)"/>
  <path d="M 200 175 L 305 120 L 305 148 L 200 203 Z" fill="url(#c2r)"/>

  <!-- Chevron 3 - Contenido curado por nicho -->
  <path d="M 135 185 L 200 230 L 200 255 L 135 210 Z" fill="url(#c3l)"/>
  <path d="M 200 230 L 265 185 L 265 210 L 200 255 Z" fill="url(#c3r)"/>

  <!-- Flecha - Crecimiento y oportunidades -->
  <path d="M 200 260 L 260 310 L 220 310 L 220 350 L 180 350 L 180 310 L 140 310 Z" fill="#1DB954"/>
</svg>
